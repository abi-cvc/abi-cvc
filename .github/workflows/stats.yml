name: GitHub Profile Language Analytics
on:
  schedule:
    - cron: "0 0 * * *" # Se actualiza cada medianoche
  workflow_dispatch: # Permite ejecutarlo manualmente
permissions:
  contents: write
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: StefVuck/Github-Language-Stats@v1.1.0
        with:
          github_token: ${{ secrets.STATS_TOKEN }}
          visualization_types: "leaderboard" # Puedes usar "pie" o "bar" también
          output_path: "stats" # Carpeta donde se guardará la imagen
